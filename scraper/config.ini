; Non-secret Supabase connection details for the scraper.
; The database PASSWORD is NOT stored here — it is entered on first run and
; saved to credentials.csv (which is gitignored). Fill in the two values below
; (they also appear in your Supabase pooler hostname, so they are not secret).
;
; Find these in Supabase -> Project Settings -> Database -> Connection string.
[supabase]
project_ref = your-project-ref
region = ap-southeast-1
; Optional: override only if your pooler host is not the default below.
; host = aws-0-ap-southeast-1.pooler.supabase.com
host =

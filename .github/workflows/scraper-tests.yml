name: Scraper checks

on:
  pull_request:
    paths:
      - "scraper/**"
      - ".github/workflows/scraper-tests.yml"
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/scraper-tests.yml"

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scraper/requirements.txt

      - name: Compile scraper
        run: >-
          python -m py_compile
          scraper/scrape.py
          scraper/scrapling_client.py
          scraper/tests/test_scraper_helpers.py

      - name: Run scraper unit tests
        run: python -m unittest discover -s scraper/tests -v

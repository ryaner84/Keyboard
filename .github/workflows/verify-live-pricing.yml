# Manually-triggered check that the LIVE site's released section actually
# renders pricing: fetches /api/released?availability=available from
# production and runs every returned set through the same computeCheapest()
# the cards use (scripts/verify-released-pricing.mjs). Fails if any
# "available" set would render without a price.
name: Verify live released pricing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/app/api/released/**"
      - "src/app/api/poster/**"
      - "src/app/share/**"
      - "src/lib/pricing.ts"
      - "src/components/set-detail/VendorTable.tsx"
      - "scripts/verify-released-pricing.mjs"
      - ".github/workflows/verify-live-pricing.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Give Vercel time to finish deploying before we hit the live API.
      - name: Wait for Vercel deploy (push-triggered only)
        if: github.event_name == 'push'
        run: sleep 120

      - name: Raw API snapshot (available / all)
        run: |
          echo "=== availability=available ==="
          curl -sf "https://keyboard-six-tau.vercel.app/api/released?availability=available&page=1&limit=12" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);console.log('totalReleased:',j.totalReleased,'totalAvailable:',j.totalAvailable,'returned:',j.data.length);for(const g of j.data){const base=g.kits.find(k=>k.type==='BASE')??g.kits[0];const priced=(base?.vendorKits??[]).filter(v=>v.price!=null);console.log(' -',g.slug,'| priced vendorKits:',priced.length,priced.map(v=>v.price+' '+(v.currency??'(vendor:'+v.vendor.currency+')')).join(', '))}})"
          echo "=== availability=(all) first page ==="
          curl -sf "https://keyboard-six-tau.vercel.app/api/released?page=1&limit=12" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);console.log('total:',j.total,'returned:',j.data.length);let priced=0;for(const g of j.data){const base=g.kits.find(k=>k.type==='BASE')??g.kits[0];if((base?.vendorKits??[]).some(v=>v.price!=null))priced++}console.log('sets with a live price on first page:',priced,'/',j.data.length)})"

      - name: Card-render check (computeCheapest, SG viewer)
        run: BASE_URL=https://keyboard-six-tau.vercel.app npx --yes tsx scripts/verify-released-pricing.mjs

      # WhatsApp/iMessage previews require an HTML page whose og:image points
      # at the poster PNG. Verifies the /share page serves those tags and the
      # poster endpoint actually returns an image/png.
      - name: Share page OG check (WhatsApp preview)
        run: |
          SHARE="https://keyboard-six-tau.vercel.app/share/gmk-cherry-love?country=SG&currency=SGD"
          POSTER="https://keyboard-six-tau.vercel.app/api/poster/gmk-cherry-love?country=SG&currency=SGD"
          html=$(curl -sf "$SHARE")
          echo "$html" | grep -o '<meta property="og:title"[^>]*>'
          echo "$html" | grep -o '<meta property="og:image"[^>]*>' | head -3
          echo "$html" | grep '<meta property="og:image"' | grep -q "/api/poster/gmk-cherry-love" \
            || { echo "FAIL: og:image does not point at the poster API"; exit 1; }
          ct=$(curl -sf -o /dev/null -w "%{content_type}" "$POSTER")
          t=$(curl -sf -o /dev/null -w "%{time_total}" "$POSTER")
          echo "poster content-type: $ct (took ${t}s)"
          case "$ct" in
            image/png*) echo "OK: poster serves image/png" ;;
            *) echo "FAIL: poster content-type is $ct"; exit 1 ;;
          esac

# Scrapes vendor prices into the production DB from a GitHub runner.
# Vendor Shopify stores block Vercel's serverless IPs, but generally serve
# runner IPs fine — this fills the gap between nightly WorkSpace scraper runs.
#
# Requires the repository secret DATABASE_URL (Supabase transaction-pooler
# connection string). Without it the job exits cleanly doing nothing.
name: Refresh vendor prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *" # every 6 hours

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/refresh-prices-ci.mjs

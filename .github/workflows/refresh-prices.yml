# Scrapes vendor prices into the production DB from a GitHub runner.
# Vendor Shopify stores block Vercel's serverless IPs, but generally serve
# runner IPs fine — this fills the gap between nightly WorkSpace scraper runs.
#
# Requires the repository secret DATABASE_URL (Supabase transaction-pooler
# connection string). If it contains the __PASSWORD__ placeholder, the
# DATABASE_PASSWORD secret must be set too (same split as the Vercel env).
# Without DATABASE_URL the job exits cleanly doing nothing.
#
# Tracker alert emails are intentionally excluded from this workflow. They run
# daily through Vercel's /api/currencies?force=true cron, where the production
# email and authentication environment variables are available.
name: Refresh vendor prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *" # every 6 hours

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Print pending wrong-price reports (the review feed) and re-queue the
      # reported listings so the refresh below re-verifies them first.
      - name: Pending price reports (review + re-queue)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: node scripts/price-reports-ci.mjs

      - name: Refresh prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: npx tsx scripts/refresh-prices-ci.mjs
